name: Blip
options:
  bundleIdPrefix: com.infamousvague
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "16.0"

settings:
  base:
    DEVELOPMENT_TEAM: F6ZAL7ANAD
    CODE_SIGN_STYLE: Manual

targets:
  Blip:
    type: application
    platform: macOS
    sources:
      - path: Blip
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.infamousvague.blip
        CODE_SIGN_IDENTITY: "Developer ID Application"
        PROVISIONING_PROFILE_SPECIFIER: "Blip Developer ID"
        CODE_SIGN_ENTITLEMENTS: Blip/Blip.entitlements
        INFOPLIST_FILE: Blip/Info.plist
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/blip-core/target/release"
          - "$(PROJECT_DIR)/blip-core/target/debug"
        OTHER_LDFLAGS:
          - "-lblip_core"
          - "-framework Security"
          - "-framework SystemConfiguration"
          - "-framework NetworkExtension"
          - "-framework SystemExtensions"
          - "-framework WebKit"
          - "-lresolv"
          - "-liconv"
          - "-lsqlite3"
        SWIFT_VERSION: "5.0"
        SWIFT_OBJC_BRIDGING_HEADER: "Blip/Blip-Bridging-Header.h"
        ENABLE_HARDENED_RUNTIME: YES
        MACOSX_DEPLOYMENT_TARGET: "12.0"
    postCompileScripts:
      - script: |
          APP="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app"
          RESOURCES="${APP}/Contents/Resources"

          # Copy React frontend
          WEB_DIR="${RESOURCES}/web"
          rm -rf "${WEB_DIR}"
          cp -R "${PROJECT_DIR}/dist" "${WEB_DIR}"

          # Copy GeoIP and ASN databases
          RES_DIR="${RESOURCES}/resources"
          mkdir -p "${RES_DIR}"
          cp "${PROJECT_DIR}/src-tauri/resources/GeoLite2-City.mmdb" "${RES_DIR}/" 2>/dev/null || true
          cp "${PROJECT_DIR}/src-tauri/resources/dbip-asn.mmdb" "${RES_DIR}/" 2>/dev/null || true

          # Copy system extension into app bundle
          SYSEXT_DIR="${APP}/Contents/Library/SystemExtensions"
          mkdir -p "${SYSEXT_DIR}"
          cp -R "${BUILT_PRODUCTS_DIR}/BlipNE.systemextension" "${SYSEXT_DIR}/com.infamousvague.blip.network-extension.systemextension" 2>/dev/null || true

          # Embed provisioning profiles
          PROFILE_DIR="${HOME}/Library/MobileDevice/Provisioning Profiles"
          cp "${PROFILE_DIR}/Blip_Developer_ID.provisionprofile" "${APP}/Contents/embedded.provisionprofile" 2>/dev/null || true
          NE_SYSEXT="${SYSEXT_DIR}/com.infamousvague.blip.network-extension.systemextension"
          if [ -d "${NE_SYSEXT}" ]; then
            mkdir -p "${NE_SYSEXT}/Contents"
            cp "${PROFILE_DIR}/Blip_NE_Developer_ID.provisionprofile" "${NE_SYSEXT}/Contents/embedded.provisionprofile" 2>/dev/null || true
          fi
        name: "Bundle Resources"
    dependencies:
      - target: BlipNE
        embed: false

  BlipNE:
    type: system-extension
    platform: macOS
    sources:
      - path: BlipNE
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.infamousvague.blip.network-extension
        CODE_SIGN_IDENTITY: "Developer ID Application"
        PROVISIONING_PROFILE_SPECIFIER: "Blip NE Developer ID"
        CODE_SIGN_ENTITLEMENTS: BlipNE/BlipNE.entitlements
        INFOPLIST_FILE: BlipNE/Info.plist
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: YES
        MACOSX_DEPLOYMENT_TARGET: "12.0"
        SYSTEM_EXTENSION_API_VERSION: "1"
