name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Clone base library
        run: git clone https://github.com/InfamousVague/base.git ../../Libs/base

      - name: Install npm dependencies
        run: npm ci

      - name: Skip tsc for CI build
        run: npm pkg set scripts.build="vite build"

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12

      - name: Build NE + Tauri app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          # Build Network Extension
          cd src-tauri && bash scripts/build-ne.sh && cd ..
          # Build Tauri (compiles Rust + frontend, creates .app bundle + DMG)
          npm run tauri build

      - name: Post-build (embed NE + profiles, re-sign, rebuild DMG)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          # Write .env.apple so post-build.sh can source it
          echo "APPLE_SIGNING_IDENTITY=\"$APPLE_SIGNING_IDENTITY\"" > .env.apple
          # Run the same post-build script used by `make sign`
          cd src-tauri && bash scripts/post-build.sh

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          echo "Notarizing: $DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG"
          echo "Notarized and stapled: $DMG"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          TAG="${GITHUB_REF_NAME}"
          # Delete existing release if re-running
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            "$DMG" \
            --title "Blip $TAG" \
            --notes "See the assets to download and install this version." \
            --latest
          echo "Released: $TAG with $DMG"
